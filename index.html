<!DOCTYPE html>
<html>

<head>
 <title>Cookie Clicker</title>
 <meta charset="utf-8">

 <!-- LINK CSS FILE -->
 <link rel="stylesheet" href="styles/style.css">
</head>

<body>
 <div id="stats">
   <h2 id="cookie-count">Cookies: 0</h2>
   <p id="cps-display">Cookies Per Second: 0</p>
 </div>

 <img id="clicker-cookie" src="https://tcrf.net/images/thumb/c/cb/Cookieclicker-imperfectcookie.png/256px-Cookieclicker-imperfectcookie.png" alt="cookie clicker">
 <div id="cursor-layer"></div>

 <div id="store">
   <h1>Store</h1>
   <div class="upgrade building" data-name="Cursor" data-is-cursor="true" data-cps="0.1">
     <h2 class="item-name">Cursor</h2>
     <p class="price">15</p>
     <small>+0.1 CPS</small>
   </div>
   <div class="upgrade building" data-name="Grandma" data-cps="1">
     <h2 class="item-name">Grandma</h2>
     <p class="price">100</p>
     <small>+1 cps</small>
   </div>
   <div class="upgrade building" data-name="Farm" data-cps="8">
     <h2 class="item-name">Farm</h2>
     <p class="price">1100</p>
     <small>+8 cps</small>
   </div>
   <div class="upgrade building" data-name="Mine" data-cps="47">
     <h2 class="item-name">Mine</h2>
     <p class="price">12000</p>
     <small>+47 cps</small>
   </div>
   <div class="upgrade building" data-name="Factory" data-cps="260">
     <h2 class="item-name">Factory</h2>
     <p class="price">130000</p>
     <small>+260 cps</small>
   </div>

   <div id="upgrades">
     <h1>Upgrades:</h1>

     <!-- (ALL YOUR UPGRADE HTML REMAINS EXACTLY THE SAME) -->

   </div>
 </div>

 <!-- LINK JS FILE -->
 <script src="scripts/script.js"></script>

</body>
</html>
